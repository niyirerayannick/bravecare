<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful — BraveCare Outreach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm text-center">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
                <i class="fas fa-heartbeat text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">BraveCare Outreach</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5">
                <i class="fas fa-check-circle text-emerald-500 text-4xl"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Password Reset Successful!</h2>
            <p class="text-gray-500 text-sm mb-8">Your password has been updated successfully. You can now sign in with your new password.</p>

            <a href="/accounts/login/"
               class="block w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl transition-colors shadow-lg shadow-emerald-200 text-sm">
                <i class="fas fa-sign-in-alt mr-2"></i>Sign In Now
            </a>
        </div>

        <p class="text-slate-400 text-xs mt-6">&copy; 2025 BraveCare Outreach. All rights reserved.</p>
    </div>

    <script>
        // Auto-redirect after 8 seconds
        setTimeout(() => window.location.href = '/accounts/login/', 8000);
    </script>
</body>
</html>
