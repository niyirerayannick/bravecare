<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Reset Code — BraveCare Outreach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">BraveCare Outreach</h1>
            <p class="text-emerald-300 text-sm mt-1">Password Reset</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-envelope-open-text text-amber-500 text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 mb-1">Enter your reset code</h2>
                <p class="text-gray-500 text-sm">
                    We sent a 6-digit code to<br>
                    <span class="font-semibold text-gray-700">{{ email_hint }}</span>
                </p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="flex items-center gap-2 p-3 rounded-xl mb-4 text-sm
                    {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200
                    {% else %}bg-red-50 text-red-600 border border-red-200{% endif %}">
                    <i class="fas {% if message.tags == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" id="otpForm">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2 text-center">Reset code</label>
                    <input type="text" name="code" id="otpInput"
                           maxlength="6" inputmode="numeric" autocomplete="one-time-code"
                           placeholder="000000"
                           class="w-full text-center text-3xl font-mono font-bold tracking-[0.5em] py-4 border-2 border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all"
                           autofocus>
                </div>
                <button type="submit"
                        class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl transition-colors shadow-lg shadow-emerald-200 text-sm mb-3">
                    <i class="fas fa-arrow-right mr-2"></i>Continue
                </button>
            </form>

            <form method="POST" id="resendForm">
                {% csrf_token %}
                <input type="hidden" name="action" value="resend">
                <button type="submit" id="resendBtn"
                        class="w-full py-2.5 text-sm text-emerald-600 hover:text-emerald-700 font-medium rounded-xl hover:bg-emerald-50 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-redo text-xs"></i>
                    <span id="resendText">Resend code</span>
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-gray-100 text-center">
                <a href="/accounts/forgot-password/" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fas fa-arrow-left text-xs mr-1"></i> Try a different email
                </a>
            </div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-6">&copy; 2025 BraveCare Outreach. All rights reserved.</p>
    </div>

    <script>
        document.getElementById('otpInput').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            if (this.value.length === 6) document.getElementById('otpForm').submit();
        });

        let cooldown = 0;
        const btn = document.getElementById('resendBtn');
        const txt = document.getElementById('resendText');

        document.getElementById('resendForm').addEventListener('submit', function() {
            cooldown = 60;
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            const iv = setInterval(() => {
                cooldown--;
                txt.textContent = `Resend code (${cooldown}s)`;
                if (cooldown <= 0) {
                    clearInterval(iv);
                    txt.textContent = 'Resend code';
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }, 1000);
        });
    </script>
</body>
</html>
