{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BraveCare Outreach</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://hpgt.org/wp-content/uploads/2025/02/slide-2-scaled-1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.35;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 60%, #022c22 100%);
            opacity: 0.82;
            z-index: -1;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 36rem;
            background: #065f46;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
        }

        /* ── Card body ── */
        .card-body { padding: 3rem 3.5rem 2.5rem; }

        /* ── Brand ── */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .brand-logo img {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 0.5rem;
        }

        /* ── Heading ── */
        .heading { text-align: center; margin-bottom: 1.75rem; }
        .heading h1 {
            font-size: 1.75rem; font-weight: 800;
            color: #fff; line-height: 1.2;
        }
        .heading p { font-size: 0.875rem; color: #a7f3d0; margin-top: 0.4rem; }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 1.75rem;
        }

        /* ── Alert ── */
        .alert {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 0.875rem;
            border-radius: 0.6rem;
            font-size: 0.82rem;
            background: rgba(254,226,226,0.15);
            color: #fca5a5;
            border: 1px solid rgba(252,165,165,0.3);
            margin-bottom: 1.25rem;
        }
        .alert svg { flex-shrink: 0; width: 1rem; height: 1rem; }

        /* ── Fields ── */
        .field { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.875rem; font-weight: 600;
            color: #d1fae5;
            margin-bottom: 0.45rem;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%);
            color: #6b7280; display: flex; align-items: center;
        }
        .input-icon svg { width: 1rem; height: 1rem; }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 0.875rem 0.8rem 2.6rem;
            background: #f0fdf4;
            border: 1.5px solid transparent;
            border-radius: 0.625rem;
            font-size: 0.9375rem;
            color: #111827;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        }
        input::placeholder { color: #9ca3af; }
        input[type="password"] { padding-right: 2.75rem; }

        .pwd-toggle {
            position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #9ca3af; display: flex; align-items: center; padding: 0;
        }
        .pwd-toggle:hover { color: #4b5563; }
        .pwd-toggle svg { width: 1.05rem; height: 1.05rem; }

        /* ── Row: remember me + forgot ── */
        .row-meta {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem; margin-top: 0.25rem;
        }
        .remember {
            display: flex; align-items: center; gap: 0.45rem;
            font-size: 0.82rem; color: #a7f3d0; cursor: pointer;
            user-select: none;
        }
        .remember input[type="checkbox"] {
            width: 1rem; height: 1rem;
            accent-color: #10b981;
            cursor: pointer;
            padding: 0; background: none; border: none;
        }
        .forgot-link {
            font-size: 0.82rem; font-weight: 500;
            color: #34d399; text-decoration: none;
        }
        .forgot-link:hover { color: #6ee7b7; }

        /* ── Button ── */
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            width: 100%; padding: 0.9rem;
            background: #10b981; color: #fff;
            font-size: 1rem; font-weight: 700;
            border: none; border-radius: 0.625rem;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(16,185,129,0.45);
            transition: background .15s, transform .1s, box-shadow .15s;
            letter-spacing: 0.01em;
        }
        .btn:hover  { background: #059669; box-shadow: 0 4px 22px rgba(16,185,129,0.55); }
        .btn:active { transform: scale(0.98); }
        .btn svg { width: 1rem; height: 1rem; }

        /* ── Card footer strip ── */
        .card-foot {
            background: #022c22;
            padding: 0.9rem 3.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6ee7b7;
        }

        @media (max-width: 500px) {
            body { padding: 0.5rem; }
            .card { border-radius: 1rem; }
            .card-body { padding: 2rem 1.25rem 1.75rem; }
            .card-foot { padding: 0.875rem 1.25rem; }
            .heading h1 { font-size: 1.35rem; }
            .brand-logo img { max-width: 200px; }
        }
    </style>
</head>
<body>

<div class="card">

    <div class="card-body">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-logo">
                <img src="{% static 'images/logo.png' %}" alt="BraveCare Outreach">
            </div>
        </div>

        <!-- Heading -->
        <div class="heading">
            <h1>Sign in to BraveCare</h1>
            <p>Secure access for health professionals</p>
        </div>

        <hr class="divider">

        {% if messages %}
            {% for message in messages %}
            <div class="alert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label for="id_username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="id_username" name="username" required autofocus placeholder="Enter your username">
                </div>
            </div>

            <div class="field">
                <label for="id_password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="id_password" name="password" required placeholder="Enter your password">
                    <button type="button" class="pwd-toggle" onclick="togglePwd()" aria-label="Toggle password">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="row-meta">
                <label class="remember">
                    <input type="checkbox" name="remember_me"> Remember me
                </label>
                <a href="/accounts/forgot-password/" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign in
            </button>
        </form>

    </div>

    <div class="card-foot">
        BraveCare v1.0 &copy; 2026 BraveCare Outreach Management System
    </div>

</div>

<script>
    function togglePwd() {
        const input = document.getElementById('id_password');
        const icon  = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>
</body>
</html>
